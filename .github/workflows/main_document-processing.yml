name: Build and deploy Python project to Azure Function App - document-processing
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DA40DBB586164BE2B9DC78AD2874DFF7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CFFA585E748C46E28CFDBBD2F0975A37 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DC0E8E62757B4254983406E6AA1A1BA4 }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'document-processing'
          package: '.'
          sku: 'flexconsumption'
          remote-build: true
